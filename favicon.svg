<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 8x8 pixel grid (each pixel = 4x4 units), sphere centered at grid -->

  <!-- Row 0 (y=0): top of sphere -->
  <rect x="12" y="0" width="4" height="4" fill="#a5b4fc"/>
  <rect x="16" y="0" width="4" height="4" fill="#818cf8"/>

  <!-- Row 1 (y=4) -->
  <rect x="8"  y="4" width="4" height="4" fill="#c7d2fe"/>
  <rect x="12" y="4" width="4" height="4" fill="#a5b4fc"/>
  <rect x="16" y="4" width="4" height="4" fill="#818cf8"/>
  <rect x="20" y="4" width="4" height="4" fill="#6366f1"/>

  <!-- Row 2 (y=8) -->
  <rect x="4"  y="8" width="4" height="4" fill="#a5b4fc"/>
  <rect x="8"  y="8" width="4" height="4" fill="#c7d2fe"/>
  <rect x="12" y="8" width="4" height="4" fill="#e0e7ff"/>
  <rect x="16" y="8" width="4" height="4" fill="#a5b4fc"/>
  <rect x="20" y="8" width="4" height="4" fill="#6366f1"/>
  <rect x="24" y="8" width="4" height="4" fill="#4f46e5"/>

  <!-- Row 3 (y=12) -->
  <rect x="4"  y="12" width="4" height="4" fill="#818cf8"/>
  <rect x="8"  y="12" width="4" height="4" fill="#a5b4fc"/>
  <rect x="12" y="12" width="4" height="4" fill="#818cf8"/>
  <rect x="16" y="12" width="4" height="4" fill="#7c3aed"/>
  <rect x="20" y="12" width="4" height="4" fill="#6366f1"/>
  <rect x="24" y="12" width="4" height="4" fill="#4338ca"/>

  <!-- Row 4 (y=16) -->
  <rect x="4"  y="16" width="4" height="4" fill="#6366f1"/>
  <rect x="8"  y="16" width="4" height="4" fill="#818cf8"/>
  <rect x="12" y="16" width="4" height="4" fill="#6366f1"/>
  <rect x="16" y="16" width="4" height="4" fill="#5b21b6"/>
  <rect x="20" y="16" width="4" height="4" fill="#4f46e5"/>
  <rect x="24" y="16" width="4" height="4" fill="#3730a3"/>

  <!-- Row 5 (y=20) -->
  <rect x="4"  y="20" width="4" height="4" fill="#4f46e5"/>
  <rect x="8"  y="20" width="4" height="4" fill="#6366f1"/>
  <rect x="12" y="20" width="4" height="4" fill="#4f46e5"/>
  <rect x="16" y="20" width="4" height="4" fill="#4338ca"/>
  <rect x="20" y="20" width="4" height="4" fill="#3730a3"/>
  <rect x="24" y="20" width="4" height="4" fill="#312e81"/>

  <!-- Row 6 (y=24) -->
  <rect x="8"  y="24" width="4" height="4" fill="#4338ca"/>
  <rect x="12" y="24" width="4" height="4" fill="#3730a3"/>
  <rect x="16" y="24" width="4" height="4" fill="#312e81"/>
  <rect x="20" y="24" width="4" height="4" fill="#312e81"/>

  <!-- Row 7 (y=28): bottom of sphere -->
  <rect x="12" y="28" width="4" height="4" fill="#312e81"/>
  <rect x="16" y="28" width="4" height="4" fill="#1e1b4b"/>
</svg>